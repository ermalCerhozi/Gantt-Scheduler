<div class="buttons">
    <h3 class="gradient-text">D3 GANTT CHART SCHEDULER</h3>
    <button mat-stroked-button (click)="createEvent()">
        Create New Event
        <mat-icon>add</mat-icon>
    </button>
</div>

<scheduler
    [tableRows]="tableRows"
    [events]="events"
    [weekends]="weekEnds"
    [holidays]="holidays"
    [activeView]="'month'"
    (onSave)="save($event)"
    (onDateChange)="getEventsOfDate($event)"
    (onEventClick)="onEventClick($event)"
></scheduler>
